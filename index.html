<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนเข้าพักอัจฉริยะ V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen pb-12">

    <nav class="bg-blue-700 text-white p-4 shadow-md mb-6">
        <div class="max-w-3xl mx-auto font-bold text-lg">
            🏨 ระบบลงทะเบียนเข้าพัก (แก้ไขระบบสแกนวันที่สมบูรณ์แบบ)
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 space-y-6">
        
        <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-base font-bold text-slate-800 mb-4">1. ถ่ายภาพหรือเลือกรูปถ่ายบัตรประชาชน (เน้นภาพแนวตรง ชัดเจน)</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                <button type="button" onclick="document.getElementById('cameraInput').click()" class="bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold py-3.5 px-4 rounded-xl border border-blue-200 text-center transition shadow-sm">
                    📸 เปิดกล้องถ่ายภาพบัตร
                </button>
                <button type="button" onclick="document.getElementById('galleryInput').click()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3.5 px-4 rounded-xl border border-slate-300 text-center transition shadow-sm">
                    📁 เลือกจากคลังรูปภาพ
                </button>

                <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="handleImageFile(event)">
                <input type="file" id="galleryInput" accept="image/*" class="hidden" onchange="handleImageFile(event)">
            </div>

            <div class="border-2 border-dashed border-slate-200 rounded-xl p-2 bg-slate-50 flex items-center justify-center min-h-[200px]">
                <img id="imgPreview" class="max-h-64 rounded-lg shadow-sm hidden">
                <span id="previewPlaceholder" class="text-slate-400 text-sm">ยังไม่ได้เลือกรูปภาพบัตรประชาชน</span>
            </div>

            <button id="ocrBtn" onclick="runThaiOCR()" disabled class="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-3.5 px-4 rounded-xl transition disabled:opacity-40 disabled:cursor-not-allowed shadow text-md">
                ⚡ เริ่มสแกนข้อความภาษาไทย (OCR)
            </button>
            
            <div id="loadingStatus" class="text-center font-bold text-blue-600 p-3 bg-blue-50 rounded-xl mt-3 hidden animate-pulse">ระบบกำลังสกัดข้อมูลตามโครงสร้างลำดับ พ.ศ. กรุณารอสักครู่...</div>
        </div>

        <form id="checkinForm" onsubmit="saveToGoogleSheets(event)" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-4">
            <h2 class="text-base font-bold text-slate-800 border-b pb-2">📝 2. ข้อมูลจากบัตรประชาชน (ตรวจสอบความถูกต้อง)</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="sm:col-span-1">
                    <label class="text-xs font-bold text-slate-600">เลขบัตรประชาชน</label>
                    <input type="text" id="idCard" class="mt-1 w-full p-3 border rounded-xl font-mono text-sm bg-slate-50" required>
                </div>
                <div class="sm:col-span-2">
                    <label class="text-xs font-bold text-slate-600">ชื่อตัวและชื่อสกุล</label>
                    <input type="text" id="fullName" class="mt-1 w-full p-3 border rounded-xl bg-slate-50" required>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="text-xs font-bold text-slate-600">เกิดวันที่</label>
                    <input type="text" id="birthDate" placeholder="อัตโนมัติ" class="mt-1 w-full p-3 border rounded-xl bg-slate-50">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-600">วันออกบัตร</label>
                    <input type="text" id="issueDate" placeholder="อัตโนมัติ" class="mt-1 w-full p-3 border rounded-xl bg-slate-50">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-600">วันบัตรหมดอายุ</label>
                    <input type="text" id="expiryDate" placeholder="อัตโนมัติ" class="mt-1 w-full p-3 border rounded-xl bg-slate-50">
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-slate-600">ที่อยู่</label>
                <textarea id="address" rows="3" class="mt-1 w-full p-3 border rounded-xl bg-slate-50"></textarea>
            </div>

            <div id="rawBox" class="bg-amber-50 p-3 rounded-xl border border-amber-200 hidden">
                <label class="text-xs font-bold text-amber-800 block mb-1">💡 ข้อความดิบทั้งหมดที่ระบบสแกนเจอ:</label>
                <textarea id="rawTextArea" rows="4" readonly class="w-full p-2 text-xs bg-white border border-amber-300 rounded-lg text-slate-600 font-mono"></textarea>
            </div>

            <h2 class="text-base font-bold text-slate-800 border-b pb-2 pt-4">🔑 3. ข้อมูลการเข้าพักเพิ่มเติม</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold text-slate-600">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" class="mt-1 w-full p-3 border rounded-xl" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-600">เลขห้องพัก</label>
                    <input type="text" id="roomNumber" class="mt-1 w-full p-3 border rounded-xl" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-600">วันเข้าพัก</label>
                    <input type="date" id="checkInDate" class="mt-1 w-full p-3 border rounded-xl" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-600">วันออก</label>
                    <input type="date" id="checkOutDate" class="mt-1 w-full p-3 border rounded-xl" required>
                </div>
            </div>

            <button type="submit" id="saveBtn" disabled class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-4 px-4 rounded-xl shadow-md transition disabled:bg-slate-300 disabled:cursor-not-allowed text-base mt-6">
                💾 บันทึกข้อมูลลง Google Sheet
            </button>
        </form>
    </main>

    <script>
        // 🔴 นำ URL เว็บแอปใหม่ล่าสุดจาก Google Apps Script มาแปะตรงนี้ครับ
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwF1YDJhqdK_n_DWhYylfPfjhAZnLiNd3pbxysoADQTma5aiCbW5Gu68M6jMXrkO2fb5A/exec"; 
        let base64ImageStr = "";

        function handleImageFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imgPreview').src = e.target.result;
                document.getElementById('imgPreview').classList.remove('hidden');
                document.getElementById('previewPlaceholder').classList.add('hidden');
                document.getElementById('ocrBtn').disabled = false;
                
                base64ImageStr = e.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }

        async function runThaiOCR() {
            if (!base64ImageStr) return;
            
            document.getElementById('loadingStatus').classList.remove('hidden');
            const ocrBtn = document.getElementById('ocrBtn');
            ocrBtn.disabled = true;
            
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "processOCR", image: base64ImageStr })
                });
                const result = await response.json();
                
                if (result.status === "success") {
                    // เติมข้อมูลลงฟอร์ม
                    document.getElementById('idCard').value = result.data.idCard || "";
                    document.getElementById('fullName').value = result.data.fullName || "";
                    document.getElementById('birthDate').value = result.data.birthDate || "";
                    document.getElementById('address').value = result.data.address || "";
                    document.getElementById('issueDate').value = result.data.issueDate || "";
                    document.getElementById('expiryDate').value = result.data.expiryDate || "";
                    
                    document.getElementById('rawTextArea').value = result.rawText || "";
                    document.getElementById('rawBox').classList.remove('hidden');
                    
                    document.getElementById('saveBtn').disabled = false;
                    alert("สแกนและจัดเรียงตามลำดับวันที่สำเร็จ! โปรดตรวจสอบข้อมูลก่อนบันทึก");
                } else {
                    alert("สแกนล้มเหลว: " + result.message);
                }
            } catch (err) {
                alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์หลังบ้านได้");
            } finally {
                document.getElementById('loadingStatus').classList.add('hidden');
                ocrBtn.disabled = false;
            }
        }

        async function saveToGoogleSheets(event) {
            event.preventDefault();
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            
            const formData = {
                idCard: document.getElementById('idCard').value,
                fullName: document.getElementById('fullName').value,
                birthDate: document.getElementById('birthDate').value,
                address: document.getElementById('address').value,
                issueDate: document.getElementById('issueDate').value,
                expiryDate: document.getElementById('expiryDate').value,
                phone: document.getElementById('phone').value,
                roomNumber: document.getElementById('roomNumber').value,
                checkInDate: document.getElementById('checkInDate').value,
                checkOutDate: document.getElementById('checkOutDate').value
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "saveData", formData: formData })
                });
                const res = await response.json();
                if (res.status === "success") {
                    alert("🎉 บันทึกข้อมูลเข้า Google ชีต เรียบร้อยแล้ว!");
                    document.getElementById('checkinForm').reset();
                    document.getElementById('imgPreview').classList.add('hidden');
                    document.getElementById('previewPlaceholder').classList.remove('hidden');
                    document.getElementById('rawBox').classList.add('hidden');
                    document.getElementById('ocrBtn').disabled = true;
                } else {
                    alert("เกิดข้อผิดพลาดในการบันทึก: " + res.message);
                }
            } catch (err) {
                alert("เกิดปัญหาขัดข้องทางเครือข่าย ไม่สามารถบันทึกได้");
            } finally {
                saveBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
