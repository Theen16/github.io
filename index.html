<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Check-in (ปรับปรุงใหม่ ถ่ายรูปเสถียร)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <nav class="bg-sky-600 text-white shadow p-3">
        <div class="max-w-6xl mx-auto flex items-center gap-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <h1 class="text-lg font-bold">ลงทะเบียนเข้าพัก</h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-6 space-y-6">
        
        <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <h2 class="text-xl font-bold text-gray-800 mb-5 flex items-center gap-2">
                <svg class="w-6 h-6 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                รูปถ่ายบัตรประชาชน
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="flex flex-col gap-3">
                    <input type="file" id="imageInput" accept="image/jpeg,image/png" class="hidden" onchange="previewImage(event)">
                    <button onclick="document.getElementById('imageInput').click()" class="bg-sky-100 text-sky-700 hover:bg-sky-200 font-semibold py-4 px-6 rounded-xl shadow flex items-center justify-center gap-3 transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        ถ่ายรูป / เลือกภาพ
                    </button>
                    <button id="ocrBtn" onclick="processOCR()" disabled class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-6 rounded-xl shadow flex items-center justify-center gap-3 transition disabled:opacity-40 disabled:cursor-not-allowed">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        เริ่มสแกน (OCR)
                    </button>
                </div>
                <div id="previewContainer" class="border-2 border-dashed border-gray-200 rounded-xl flex items-center justify-center p-2 bg-gray-50 h-56 transition duration-300">
                    <img id="imgPreview" class="max-h-full max-w-full rounded hidden transition duration-300">
                    <p id="placeholderText" class="text-gray-400 text-sm">ตัวอย่างภาพถ่ายบัตรประชาชน</p>
                </div>
            </div>
            <div id="statusMessage" class="text-sky-700 text-center font-bold p-3 bg-sky-50 rounded-lg mt-4 hidden animate-pulse">กำลังประมวลผล กรุณารอสักครู่...</div>
        </div>

        <form id="checkinForm" onsubmit="saveData(event)" class="space-y-6">
            <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
                <h2 class="text-xl font-bold text-gray-800 mb-5 flex items-center gap-2">
                    <svg class="w-6 h-6 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    ข้อมูลจากบัตรประชาชน (ตรวจสอบความถูกต้อง)
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">คำนำหน้า</label>
                        <input type="text" id="prefix" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-sky-300 focus:ring-sky-200 focus:ring-1" required>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-600">ชื่อ - สกุล</label>
                        <input type="text" id="fullName" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-sky-300 focus:ring-sky-200 focus:ring-1" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">เลขบัตรประชาชน</label>
                        <input type="text" id="idCard" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-sky-300 focus:ring-sky-200 focus:ring-1" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">วัน/เดือน/ปีเกิด (ไทย)</label>
                        <input type="text" id="birthDate" placeholder="เช่น 21 ธ.ค. 2530" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-sky-300 focus:ring-sky-200 focus:ring-1">
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-sm font-medium text-gray-600">ที่อยู่ตามบัตรประชาชน</label>
                        <textarea id="address" rows="3" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-sky-300 focus:ring-sky-200 focus:ring-1"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">วันออกบัตร (ไทย)</label>
                        <input type="text" id="issueDate" placeholder="เช่น 1 ม.ค. 2565" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-sky-300 focus:ring-sky-200 focus:ring-1">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">วันหมดอายุ (ไทย)</label>
                        <input type="text" id="expiryDate" placeholder="เช่น 1 ม.ค. 2570" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-sky-300 focus:ring-sky-200 focus:ring-1">
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
                <h2 class="text-xl font-bold text-gray-800 mb-5 flex items-center gap-2">
                    <svg class="w-6 h-6 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    ข้อมูลห้องพักเพิ่มเติม
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">เบอร์โทรศัพท์ (จำเป็น)</label>
                        <input type="tel" id="phone" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-sky-300 focus:ring-sky-200 focus:ring-1" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">เลขห้องพัก (จำเป็น)</label>
                        <input type="text" id="roomNumber" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-sky-300 focus:ring-sky-200 focus:ring-1" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">วันเข้าพัก (จำเป็น)</label>
                        <input type="date" id="checkInDate" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-sky-300 focus:ring-sky-200 focus:ring-1" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">วันออก (จำเป็น)</label>
                        <input type="date" id="checkOutDate" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-sky-300 focus:ring-sky-200 focus:ring-1" required>
                    </div>
                </div>
            </div>

            <button type="submit" id="saveBtn" disabled class="w-full bg-sky-600 hover:bg-sky-700 text-white font-extrabold py-4 px-6 rounded-2xl shadow-lg transition text-lg disabled:bg-gray-400">
                💾 บันทึกข้อมูลเข้า Google Sheets
            </button>
        </form>

    </main>

    <script>
        // 🔴 นำ URL เว็บแอปที่ได้จากขั้นตอนทำเสร็จใน Google Apps Script มาใส่ที่นี่ (คีย์เดิมที่คุณได้มา)
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwF1YDJhqdK_n_DWhYylfPfjhAZnLiNd3pbxysoADQTma5aiCbW5Gu68M6jMXrkO2fb5A/exec"; 
        let base64ImageString = "";

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imgPreview').src = e.target.result;
                document.getElementById('imgPreview').classList.remove('hidden');
                document.getElementById('placeholderText').classList.add('hidden');
                document.getElementById('ocrBtn').disabled = false;
                base64ImageString = e.target.result.split(',')[1];
            }
            reader.readAsDataURL(file);
        }

        async function processOCR() {
            if (!base64ImageString) return;
            document.getElementById('statusMessage').classList.remove('hidden');
            const ocrBtn = document.getElementById('ocrBtn');
            ocrBtn.disabled = true; ocrBtn.innerText = "กำลังสแกน...";
            
            try {
                const response = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "processOCR", image: base64ImageString }) });
                const res = await response.json();
                
                if (res.status === "success") {
                    // นำข้อมูลที่แกะได้มาใส่ช่องฟอร์มโดยอัตโนมัติ (แก้ไขให้ครอบคลุมขึ้น)
                    document.getElementById('prefix').value = res.data.prefix || "";
                    document.getElementById('fullName').value = res.data.fullName || "";
                    document.getElementById('idCard').value = res.data.idCard || "";
                    document.getElementById('birthDate').value = res.data.birthDate || "";
                    document.getElementById('address').value = res.data.address || "";
                    document.getElementById('issueDate').value = res.data.issueDate || "";
                    document.getElementById('expiryDate').value = res.data.expiryDate || "";
                    document.getElementById('saveBtn').disabled = false;
                    alert("สแกนและดึงข้อมูลสำเร็จ! กรุณาตรวจสอบและกรอกข้อมูลเพิ่มเติมให้ครบ");
                } else {
                    alert("OCR ผิดพลาด: " + res.message);
                }
            } catch (err) {
                alert("เชื่อมต่อไม่สำเร็จ กรุณาลองใหม่");
            } finally {
                document.getElementById('statusMessage').classList.add('hidden');
                ocrBtn.innerText = "เริ่มสแกน (OCR)"; ocrBtn.disabled = false;
            }
        }

        async function saveData(event) {
            event.preventDefault();
            const formData = {
                prefix: document.getElementById('prefix').value,
                fullName: document.getElementById('fullName').value,
                idCard: document.getElementById('idCard').value,
                birthDate: document.getElementById('birthDate').value,
                address: document.getElementById('address').value,
                issueDate: document.getElementById('issueDate').value,
                expiryDate: document.getElementById('expiryDate').value,
                phone: document.getElementById('phone').value,
                checkInDate: document.getElementById('checkInDate').value,
                checkOutDate: document.getElementById('checkOutDate').value,
                roomNumber: document.getElementById('roomNumber').value
            };
            
            try {
                const response = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "saveData", formData: formData }) });
                const res = await response.json();
                if (res.status === "success") {
                    alert("🎉 บันทึกสำเร็จ!");
                    document.getElementById('checkinForm').reset();
                    document.getElementById('imgPreview').classList.add('hidden');
                    document.getElementById('placeholderText').classList.remove('hidden');
                    document.getElementById('ocrBtn').disabled = true;
                    document.getElementById('saveBtn').disabled = true;
                }
            } catch (err) { alert("บันทึกไม่สำเร็จ"); }
        }
    </script>
</body>
</html>
