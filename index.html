<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนเข้าพักอัจฉริยะ & Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-blue-600 text-white shadow-md p-4 mb-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Smart Check-in</h1>
            <div class="space-x-4">
                <button onclick="switchTab('checkin-tab')" class="hover:underline font-semibold">ลงทะเบียน</button>
                <button onclick="switchTab('dashboard-tab'); loadDashboardData();" class="hover:underline font-semibold">Dashboard</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        
        <div id="checkin-tab" class="tab-content">
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">📷 ถ่ายภาพ หรือ อัปโหลดบัตรประชาชน</h2>
                
                <div class="flex flex-col sm:flex-row gap-4 mb-4">
                    <input type="file" id="imageInput" accept="image/*" capture="environment" class="hidden" onchange="previewImage(event)">
                    <button onclick="document.getElementById('imageInput').click()" class="bg-blue-500 hover:bg-blue-600 text-white font-medium py-3 px-6 rounded-lg shadow flex items-center justify-center gap-2 w-full sm:w-auto">
                        เลือกรูปภาพ / ถ่ายภาพ
                    </button>
                    <button id="ocrBtn" onclick="processOCR()" disabled class="bg-green-500 hover:bg-green-600 text-white font-medium py-3 px-6 rounded-lg shadow disabled:opacity-50 w-full sm:w-auto">
                        เริ่มสแกนข้อความ (OCR)
                    </button>
                </div>

                <div class="mb-4 hidden" id="previewContainer">
                    <p class="text-sm text-gray-500 mb-1">ตัวอย่างรูปภาพ:</p>
                    <img id="imgPreview" class="max-h-64 rounded border shadow-sm">
                </div>
                <div id="statusMessage" class="text-blue-600 font-medium hidden">กำลังประมวลผล OCR กรุณารอสักครู่...</div>
            </div>

            <form id="checkinForm" onsubmit="saveData(event)" class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">📝 ตรวจสอบและกรอกข้อมูลเพิ่มเติม</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">คำนำหน้าชื่อ</label>
                        <input type="text" id="prefix" class="mt-1 block w-full rounded border-gray-300 shadow-sm p-2 border" required>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700">ชื่อ - สกุล</label>
                        <input type="text" id="fullName" class="mt-1 block w-full rounded border-gray-300 shadow-sm p-2 border" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">เลขบัตรประชาชน</label>
                        <input type="text" id="idCard" class="mt-1 block w-full rounded border-gray-300 shadow-sm p-2 border" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">วัน เดือน ปีเกิด</label>
                        <input type="text" id="birthDate" placeholder="เช่น 01 ม.ค. 2530" class="mt-1 block w-full rounded border-gray-300 shadow-sm p-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" class="mt-1 block w-full rounded border-gray-300 shadow-sm p-2 border" required>
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-sm font-medium text-gray-700">ที่อยู่ตามบัตรประชาชน</label>
                        <textarea id="address" rows="2" class="mt-1 block w-full rounded border-gray-300 shadow-sm p-2 border"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">วันออกบัตร</label>
                        <input type="text" id="issueDate" class="mt-1 block w-full rounded border-gray-300 shadow-sm p-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">วันหมดอายุ</label>
                        <input type="text" id="expiryDate" class="mt-1 block w-full rounded border-gray-300 shadow-sm p-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">เลขห้องพัก</label>
                        <input type="text" id="roomNumber" class="mt-1 block w-full rounded border-gray-300 shadow-sm p-2 border" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">วันเข้าพัก</label>
                        <input type="date" id="checkInDate" class="mt-1 block w-full rounded border-gray-300 shadow-sm p-2 border" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">วันออก</label>
                        <input type="date" id="checkOutDate" class="mt-1 block w-full rounded border-gray-300 shadow-sm p-2 border" required>
                    </div>
                </div>
                <div class="mt-6">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow">
                        💾 บันทึกข้อมูลลง Google Sheet
                    </button>
                </div>
            </form>
        </div>

        <div id="dashboard-tab" class="tab-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-white p-6 rounded-lg shadow text-center border-t-4 border-green-500">
                    <h3 class="text-gray-500 text-sm font-medium">เข้าพักรายวัน (วันนี้)</h3>
                    <p id="countDaily" class="text-3xl font-bold text-gray-800 mt-2">0</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow text-center border-t-4 border-blue-500">
                    <h3 class="text-gray-500 text-sm font-medium">เข้าพักรายสัปดาห์ (7 วันล่าสุด)</h3>
                    <p id="countWeekly" class="text-3xl font-bold text-gray-800 mt-2">0</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow text-center border-t-4 border-purple-500">
                    <h3 class="text-gray-500 text-sm font-medium">เข้าพักรายเดือน (เดือนนี้)</h3>
                    <p id="countMonthly" class="text-3xl font-bold text-gray-800 mt-2">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-lg font-semibold text-gray-700 mb-4">สถิติแนวโน้มผู้เข้าพัก</h3>
                <canvas id="chartInbound" width="400" height="200"></canvas>
            </div>
        </div>

    </main>

    <script>
        // 🔴 นำ URL เว็บแอปที่ได้จากขั้นตอนทำเสร็จใน Google Apps Script มาใส่ที่นี่แทนที่เครื่องหมายคำพูดครับ
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwF1YDJhqdK_n_DWhYylfPfjhAZnLiNd3pbxysoADQTma5aiCbW5Gu68M6jMXrkO2fb5A/exec"; 
        let base64ImageString = "";

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imgPreview').src = e.target.result;
                document.getElementById('previewContainer').classList.remove('hidden');
                document.getElementById('ocrBtn').disabled = false;
                // ตัดส่วนหัวข้อความ data:image/...;base64, ออกเพื่อส่งไป Vision API
                base64ImageString = e.target.result.split(',')[1];
            }
            reader.readAsDataURL(file);
        }

        async function processOCR() {
            if (!base64ImageString) return;
            document.getElementById('statusMessage').classList.remove('hidden');
            
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "processOCR", image: base64ImageString })
                });
                const res = await response.json();
                
                if (res.status === "success") {
                    // นำข้อมูลที่แกะได้มาใส่ในช่องฟอร์มโดยอัตโนมัติ
                    document.getElementById('prefix').value = res.data.prefix || "";
                    document.getElementById('fullName').value = res.data.fullName || "";
                    document.getElementById('idCard').value = res.data.idCard || "";
                    document.getElementById('birthDate').value = res.data.birthDate || "";
                    document.getElementById('address').value = res.data.address || "";
                    document.getElementById('issueDate').value = res.data.issueDate || "";
                    document.getElementById('expiryDate').value = res.data.expiryDate || "";
                    alert("สแกนข้อมูลสำเร็จ! กรุณาตรวจสอบความถูกต้องและกรอกข้อมูลห้องพักเพิ่มเติม");
                } else {
                    alert("เกิดข้อผิดพลาดในการทำ OCR: " + res.message);
                }
            } catch (err) {
                alert("เชื่อมต่อหลังบ้านไม่สำเร็จ");
            } finally {
                document.getElementById('statusMessage').classList.add('hidden');
            }
        }

        async function saveData(event) {
            event.preventDefault();
            const formData = {
                prefix: document.getElementById('prefix').value,
                fullName: document.getElementById('fullName').value,
                idCard: document.getElementById('idCard').value,
                birthDate: document.getElementById('birthDate').value,
                address: document.getElementById('address').value,
                issueDate: document.getElementById('issueDate').value,
                expiryDate: document.getElementById('expiryDate').value,
                phone: document.getElementById('phone').value,
                checkInDate: document.getElementById('checkInDate').value,
                checkOutDate: document.getElementById('checkOutDate').value,
                roomNumber: document.getElementById('roomNumber').value
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "saveData", formData: formData })
                });
                const res = await response.json();
                if (res.status === "success") {
                    alert("บันทึกข้อมูลเข้า Google Sheets สำเร็จ!");
                    document.getElementById('checkinForm').reset();
                    document.getElementById('previewContainer').classList.add('hidden');
                    document.getElementById('ocrBtn').disabled = true;
                }
            } catch (err) {
                alert("ไม่สามารถบันทึกข้อมูลได้");
            }
        }

        // ฟังก์ชันดึงข้อมูลจากชีตมาคำนวณ Dashboard
        async function loadDashboardData() {
            try {
                const response = await fetch(WEB_APP_URL);
                const rows = await response.json();
                if (rows.length <= 1) return; // หากไม่มีข้อมูลนอกจากหัวตาราง

                const today = new Date().toISOString().split('T')[0];
                const oneWeekAgo = new Date(); oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
                const currentMonth = new Date().getMonth();
                const currentYear = new Date().getFullYear();

                let daily = 0, weekly = 0, monthly = 0;
                let dateTimeline = {};

                // ข้อมูลแถวแรกคือ Header ให้เริ่มนับที่ i = 1
                // คอลัมน์วันเข้าพัก (Index 8 อิงจากอาร์เรย์ตอนเซฟ)
                for (let i = 1; i < rows.length; i++) {
                    const checkInStr = rows[i][8]; 
                    if (!checkInStr) continue;
                    
                    const checkInDate = new Date(checkInStr);
                    const checkInISO = checkInDate.toISOString().split('T')[0];

                    // นับยอดรายวัน
                    if (checkInISO === today) daily++;
                    // นับยอดรายสัปดาห์
                    if (checkInDate >= oneWeekAgo) weekly++;
                    // นับยอดรายเดือน
                    if (checkInDate.getMonth() === currentMonth && checkInDate.getFullYear() === currentYear) monthly++;

                    // ทำ Timeline สำหรับวาดกราฟ
                    dateTimeline[checkInISO] = (dateTimeline[checkInISO] || 0) + 1;
                }

                document.getElementById('countDaily').innerText = daily;
                document.getElementById('countWeekly').innerText = weekly;
                document.getElementById('countMonthly').innerText = monthly;

                // วาดกราฟด้วย Chart.js
                const sortedDates = Object.keys(dateTimeline).sort();
                const chartData = sortedDates.map(d => dateTimeline[d]);

                if (window.myChart) window.myChart.destroy(); // ล้างกราฟเก่าก่อนวาดใหม่
                const ctx = document.getElementById('chartInbound').getContext('2d');
                window.myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: sortedDates,
                        datasets: [{
                            label: 'จำนวนห้องที่ Check-in',
                            data: chartData,
                            borderColor: 'rgb(75, 192, 192)',
                            tension: 0.1,
                            fill: false
                        }]
                    }
                });

            } catch (err) {
                console.error("โหลดข้อมูล Dashboard ไม่สำเร็จ", err);
            }
        }
    </script>
</body>
</html>
